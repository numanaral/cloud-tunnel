name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: bin/

      - name: Verify script is executable
        run: test -x bin/tunnel-cloud.sh

      - name: Verify shebang
        run: head -1 bin/tunnel-cloud.sh | grep -q '#!/usr/bin/env bash'
